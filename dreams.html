<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Завтрак исполняющий желания — ОСТРОВ</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>✨</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 50px; position: relative; }
        .header h1 { font-size: 3em; margin-bottom: 15px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .header-actions { position: absolute; top: 0; right: 0; display: flex; gap: 12px; }
        .cabinet-btn {
            padding: 10px 18px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.2); color: white; font-weight: 600; letter-spacing: 0.02em;
            cursor: pointer; transition: all 0.3s ease; backdrop-filter: blur(4px); text-decoration: none; display: inline-block;
        }
        .cabinet-btn:hover {
            background: rgba(255,255,255,0.35); box-shadow: 0 10px 25px rgba(15,22,50,0.25); transform: translateY(-1px);
        }
        .header .subtitle { font-size: 1.3em; opacity: 0.95; margin-bottom: 10px; }
        .dreams-section {
            background: white; border-radius: 25px; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .dreams-section h2 { color: #667eea; font-size: 2.2em; margin-bottom: 30px; text-align: center; }
        .filters { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center; }
        .filter-btn {
            padding: 12px 25px; border: 2px solid #667eea; background: white; color: #667eea;
            border-radius: 25px; cursor: pointer; font-size: 1em; font-weight: 500; transition: all 0.3s;
        }
        .filter-btn:hover, .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .dreams-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; margin-top: 30px;
        }
        .dream-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%); padding: 25px; border-radius: 15px;
            border-left: 5px solid #667eea; transition: all 0.5s ease-out; position: relative; opacity: 0;
            transform: translateY(30px) scale(0.95); display: flex; flex-direction: column; min-height: 250px;
        }
        .dream-card.show { opacity: 1; transform: translateY(0) scale(1); }
        .dream-card:hover { transform: translateY(-5px) scale(1) !important; box-shadow: 0 10px 25px rgba(0,0,0,0.15); }
        .skeleton-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%); padding: 25px; border-radius: 15px;
            border-left: 5px solid #667eea; position: relative; overflow: hidden; min-height: 200px;
        }
        .skeleton-card::before {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading { 0% { left: -100%; } 100% { left: 100%; } }
        .skeleton-line { height: 18px; background: rgba(102, 126, 234, 0.1); border-radius: 4px; margin-bottom: 12px; }
        .skeleton-line.short { width: 60%; } .skeleton-line.medium { width: 85%; } .skeleton-line.long { width: 100%; }
        .dream-card .status-badge {
            position: absolute; top: 15px; right: 15px; padding: 6px 15px; border-radius: 20px; font-size: 0.85em; font-weight: 600;
        }
        .status-badge.planned { background: #fff3cd; color: #856404; }
        .status-badge.in-progress { background: #cfe2ff; color: #084298; }
        .status-badge.done { background: #d1e7dd; color: #0f5132; }
        .dream-card .author { font-size: 0.9em; color: #667eea; font-weight: 600; margin-bottom: 12px; }
        .dream-card .dream-text { font-size: 1.1em; color: #333; margin-bottom: 15px; line-height: 1.6; min-height: 60px; }
        .dream-card .price { margin-top: 10px; font-size: 0.85em; color: #888; font-style: italic; }
        .dream-card .deadline { margin-top: 6px; font-size: 0.85em; color: #666; }
        .dream-card .content { flex: 1; }
        .help-btn {
            margin-top: auto; width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 10px; font-size: 1em; font-weight: 600; cursor: pointer; transition: all 0.3s;
        }
        .help-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .loading { text-align: center; padding: 60px; font-size: 1.3em; color: #667eea; }
        body.modal-open { overflow: hidden; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55); display: none; align-items: center; justify-content: center;
            padding: 20px; z-index: 999;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #fff; border-radius: 20px; max-width: 640px; width: 100%; max-height: 90vh; overflow-y: auto;
            padding: 30px; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.25);
        }
        .modal-close { position: absolute; top: 15px; right: 15px; border: none; background: transparent; font-size: 1.6em; cursor: pointer; color: #667eea; }
        .modal-title { font-size: 1.6em; color: #667eea; margin-bottom: 10px; }
        .modal-section { margin-top: 20px; }
        .modal-section h4 { font-size: 1.05em; color: #4f46e5; margin-bottom: 8px; }
        .modal-author-line { color: #111827; font-weight: 600; line-height: 1.4; }
        .modal-author-line strong { color: #4338ca; }
        .modal input[type="text"], .modal textarea {
            width: 100%; border: 1.5px solid rgba(102, 126, 234, 0.35); border-radius: 10px; padding: 10px 12px;
            font-family: inherit; font-size: 1em; background: rgba(102, 126, 234, 0.05); transition: border 0.2s ease;
        }
        .modal textarea { min-height: 90px; resize: vertical; }
        .modal input:focus, .modal textarea:focus { outline: none; border-color: #667eea; background: rgba(102, 126, 234, 0.12); }
        .modal-actions { display: flex; align-items: center; gap: 12px; margin-top: 10px; }
        .copy-btn {
            padding: 10px 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .copy-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(102, 126, 234, 0.4); }
        .copy-feedback { color: #059669; font-size: 0.9em; opacity: 0; transition: opacity 0.2s ease; }
        .copy-feedback.visible { opacity: 1; }
        .modal-contact-note { margin-top: 12px; font-size: 0.95em; color: #6b7280; }
        .modal-contact-note a { color: #667eea; font-weight: 600; }
        @media (max-width: 768px) {
            .header h1 { font-size: 2em; }
            .header .subtitle { font-size: 1.1em; }
            .dreams-grid { grid-template-columns: 1fr; }
            .dreams-section { padding: 20px; }
            .modal { padding: 24px 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-actions">
                <a href="/index.html" class="cabinet-btn">Личный кабинет</a>
            </div>
            <h1>🍳 Завтрак исполняющий желания</h1>
            <div class="subtitle">Место, где мечты становятся реальностью</div>
        </div>
        <div class="dreams-section">
            <h2 id="dreamsSectionTitle">💫 Мечты участников</h2>
            <div class="filters">
                <button class="filter-btn active" data-filter="all">Все мечты</button>
                <button class="filter-btn" data-filter="planned">Запланированные</button>
                <button class="filter-btn" data-filter="in_progress">В процессе</button>
                <button class="filter-btn" data-filter="done">Выполненные</button>
            </div>
            <div class="dreams-grid" id="dreamsGrid">
                <div class="loading">Загрузка мечт...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="helpModal">
        <div class="modal" role="dialog" aria-modal="true">
            <button class="modal-close" id="modalCloseBtn" type="button" aria-label="Закрыть">×</button>
            <h3 class="modal-title">Как помочь мечте</h3>
            <div class="modal-section">
                <div class="modal-author-line" id="modalAuthorLine">Автор</div>
            </div>
            <div class="modal-section">
                <h4>Описание мечты</h4>
                <p id="modalDreamDescription">—</p>
            </div>
            <div class="modal-section">
                <h4>Твоё имя</h4>
                <input type="text" id="helperNameInput" placeholder="Например, Максим">
            </div>
            <div class="modal-section">
                <h4>Готовое сообщение</h4>
                <textarea id="modalMessage" readonly></textarea>
                <div class="modal-actions">
                    <button class="copy-btn" id="copyMessageBtn" type="button">Скопировать</button>
                    <span class="copy-feedback" id="copyMessageFeedback"></span>
                </div>
            </div>
            <div class="modal-section">
                <p class="modal-contact-note" id="modalContactNote">Войдите в <a href="/index.html">личный кабинет</a>, чтобы связаться с участниками.</p>
            </div>
        </div>
    </div>

    <script>
        // Единый порт 8000: витрина и API с одного origin. До продакшена порт не меняем.
        var API_BASE = (function() {
            try {
                if (typeof window !== 'undefined' && window.location && window.location.origin)
                    return window.location.origin;
            } catch (e) {}
            return 'http://23.172.217.180:8000';
        })();
        var allDreams = [];
        var currentFilter = 'all';
        var dreamMap = new Map();
        var currentModalDream = null;
        var helperNameStorageKey = 'dreamsHelperName_v1';

        var modalElements = {
            overlay: document.getElementById('helpModal'),
            authorLine: document.getElementById('modalAuthorLine'),
            dreamDescription: document.getElementById('modalDreamDescription'),
            helperNameInput: document.getElementById('helperNameInput'),
            message: document.getElementById('modalMessage'),
            closeBtn: document.getElementById('modalCloseBtn'),
            copyBtn: document.getElementById('copyMessageBtn'),
            copyFeedback: document.getElementById('copyMessageFeedback')
        };

        function setupModal() {
            var savedName = '';
            try { savedName = localStorage.getItem(helperNameStorageKey) || ''; } catch (e) {}
            if (modalElements.helperNameInput) {
                modalElements.helperNameInput.value = savedName;
                modalElements.helperNameInput.addEventListener('input', function() {
                    try { localStorage.setItem(helperNameStorageKey, modalElements.helperNameInput.value.trim()); } catch (e) {}
                    updateModalMessage();
                });
            }
            modalElements.closeBtn.addEventListener('click', closeModal);
            modalElements.overlay.addEventListener('click', function(e) { if (e.target === modalElements.overlay) closeModal(); });
            modalElements.copyBtn.addEventListener('click', function() {
                if (!modalElements.message) return;
                try {
                    navigator.clipboard.writeText(modalElements.message.value);
                    if (modalElements.copyFeedback) {
                        modalElements.copyFeedback.textContent = 'Скопировано!';
                        modalElements.copyFeedback.classList.add('visible');
                        setTimeout(function() { modalElements.copyFeedback.classList.remove('visible'); }, 2000);
                    }
                } catch (err) {
                    modalElements.message.select();
                    document.execCommand('copy');
                    if (modalElements.copyFeedback) {
                        modalElements.copyFeedback.textContent = 'Скопировано!';
                        modalElements.copyFeedback.classList.add('visible');
                        setTimeout(function() { modalElements.copyFeedback.classList.remove('visible'); }, 2000);
                    }
                }
            });
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape' && modalElements.overlay.classList.contains('open')) closeModal();
            });
        }

        function openHelpModal(dreamId) {
            var dream = dreamMap.get(Number(dreamId));
            if (!dream || !modalElements.overlay) return;
            currentModalDream = dream;
            var cityPart = dream.city ? ', ' + dream.city : '';
            modalElements.authorLine.innerHTML = '<div>' + (dream.user_name || 'Участник') + cityPart + '</div>';
            modalElements.dreamDescription.textContent = dream.dream || 'Нет описания';
            if (dream.deadline) {
                var dlStr = new Date(dream.deadline).toLocaleDateString('ru-RU');
                modalElements.dreamDescription.textContent += '\n\nДедлайн: до ' + dlStr;
            }
            updateModalMessage();
            if (modalElements.copyFeedback) { modalElements.copyFeedback.textContent = ''; modalElements.copyFeedback.classList.remove('visible'); }
            modalElements.overlay.classList.add('open');
            document.body.classList.add('modal-open');
        }

        function closeModal() {
            modalElements.overlay.classList.remove('open');
            document.body.classList.remove('modal-open');
            currentModalDream = null;
        }

        function updateModalMessage() {
            if (!currentModalDream || !modalElements.message) return;
            var helperName = (modalElements.helperNameInput && modalElements.helperNameInput.value.trim()) || '...';
            var authorName = currentModalDream.user_name || 'тебя';
            modalElements.message.value = 'Привет ' + authorName + '. Меня зовут ' + helperName + '. Я хочу помочь тебе в осуществлении мечты: «' + (currentModalDream.dream || '') + '», которую я увидел в «Завтраке исполняющем желания».';
        }

        function showSkeletons(count) {
            count = count || 6;
            var grid = document.getElementById('dreamsGrid');
            var html = '';
            for (var i = 0; i < count; i++) {
                html += '<div class="skeleton-card">' +
                    '<div class="skeleton-line short"></div><div class="skeleton-line long"></div>' +
                    '<div class="skeleton-line medium"></div><div class="skeleton-line long"></div></div>';
            }
            grid.innerHTML = html;
        }

        function updateStats(dreams) {
            var uniqueUsers = {};
            dreams.forEach(function(d) { uniqueUsers[d.user_id] = true; });
            var participantsCount = Object.keys(uniqueUsers).length;
            document.getElementById('dreamsSectionTitle').textContent = '💫 Мечты ' + participantsCount + ' участников';
            var planned = dreams.filter(function(d) { return d.status === 'planned'; }).length;
            var inProgress = dreams.filter(function(d) { return d.status === 'in_progress'; }).length;
            var done = dreams.filter(function(d) { return d.status === 'done'; }).length;
            document.querySelector('[data-filter="all"]').textContent = 'Все мечты (' + dreams.length + ')';
            document.querySelector('[data-filter="planned"]').textContent = 'Запланированные (' + planned + ')';
            document.querySelector('[data-filter="in_progress"]').textContent = 'В процессе (' + inProgress + ')';
            document.querySelector('[data-filter="done"]').textContent = 'Выполненные (' + done + ')';
        }

        function renderDreams(dreams) {
            var grid = document.getElementById('dreamsGrid');
            if (dreams.length === 0) {
                grid.innerHTML = '<div class="loading">Мечт не найдено</div>';
                return;
            }
            var filtered = dreams;
            if (currentFilter !== 'all') {
                filtered = dreams.filter(function(d) { return d.status === currentFilter; });
            }
            filtered.sort(function(a, b) {
                var da = a.date ? new Date(a.date).getTime() : 0;
                var db = b.date ? new Date(b.date).getTime() : 0;
                return db - da;
            });
            var statusText = { planned: 'ждёт', in_progress: 'В процессе', done: 'Выполнена' };
            var statusClass = { planned: 'planned', in_progress: 'in-progress', done: 'done' };
            grid.innerHTML = filtered.map(function(dream) {
                dreamMap.set(dream.id, dream);
                var st = dream.status || 'planned';
                var label = statusText[st] || dream.status_label || 'Неизвестно';
                var cls = statusClass[st] || 'planned';
                var dateStr = dream.date ? new Date(dream.date).toLocaleDateString('ru-RU') : '';
                var priceHtml = dream.price != null && dream.price !== '' ? '<div class="price">💰 ' + dream.price + '</div>' : '';
                return '<div class="dream-card">' +
                    '<span class="status-badge ' + cls + '">' + label + '</span>' +
                    '<div class="content">' +
                    '<div class="author">👤 ' + (dream.user_name || 'Участник') + (dateStr ? ' · ' + dateStr : '') + '</div>' +
                    '<div class="dream-text">' + (dream.dream || '').replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div>' +
                    priceHtml + '</div>' +
                    '<button type="button" class="help-btn" data-dream-id="' + dream.id + '">🤝 Хочу помочь!</button></div>';
            }).join('');
            setTimeout(function() {
                var cards = grid.querySelectorAll('.dream-card');
                cards.forEach(function(card, index) {
                    setTimeout(function() { card.classList.add('show'); }, index * 80);
                });
            }, 50);
            grid.querySelectorAll('.help-btn').forEach(function(btn) {
                btn.addEventListener('click', function() { openHelpModal(btn.getAttribute('data-dream-id')); });
            });
        }

        function loadData() {
            showSkeletons(6);
            var url = API_BASE + '/dreams/showcase';
            fetch(url, { cache: 'no-store' })
                .then(function(res) {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(function(data) {
                    allDreams = data.dreams || [];
                    updateStats(allDreams);
                    renderDreams(allDreams);
                })
                .catch(function(err) {
                    console.error(err);
                    document.getElementById('dreamsGrid').innerHTML =
                        '<div class="loading" style="color: #e74c3c;">Не удалось загрузить мечты. Проверьте, что сервер запущен и доступен.</div>';
                });
        }

        document.querySelectorAll('.filter-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                currentFilter = this.getAttribute('data-filter');
                renderDreams(allDreams);
            });
        });

        setupModal();
        loadData();
    </script>
</body>
</html>
