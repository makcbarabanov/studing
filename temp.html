<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temp — Шаги (копия интерфейса + новые действия)</title>
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; background: #eef2f8; color: #2d3542; }
    .container { width: min(980px, 95vw); margin: 16px auto 90px; background: #fff; border-radius: 10px; box-shadow: 0 2px 18px rgba(0,0,0,.08); }
    .top { padding: 16px 20px 8px; border-bottom: 1px solid #eceff5; }
    .title { font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .meta { color: #6b768a; font-size: 13px; }
    .tabs { display: flex; gap: 14px; margin-top: 12px; font-weight: 600; font-size: 14px; }
    .tab { color: #6a7488; cursor: pointer; }
    .tab.active { color: #2e7d32; }
    .section { padding: 14px 20px 20px; }
    .filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .filter button { border: 1px solid #d2dbe8; border-radius: 7px; background: #fff; color: #4b566d; padding: 6px 10px; cursor: pointer; font-size: 13px; }
    .filter button.active { background: #4caf50; border-color: #4caf50; color: #fff; font-weight: 600; }
    .day { margin: 14px 0 6px; text-align: center; color: #6f7a90; font-weight: 600; }
    .step { display: grid; grid-template-columns: auto 1fr auto auto auto; gap: 8px; align-items: center; border-bottom: 1px solid #eef2f8; padding: 8px 0; }
    .step:last-child { border-bottom: none; }
    .left-actions { display: flex; gap: 4px; }
    .left-actions button { width: 30px; height: 28px; border-radius: 6px; border: 1px solid #cfd8e6; cursor: pointer; background: #fff; }
    .btn-done { color: #2e7d32; }
    .btn-missed { color: #c62828; font-weight: 700; font-size: 16px; line-height: 1; }
    .btn-comment { color: #2d5b99; font-size: 15px; line-height: 1; padding: 0; }
    .main { min-width: 0; }
    .main .name { font-weight: 500; margin-bottom: 4px; }
    .main .when { color: #667289; font-size: 12px; margin-top: 2px; }
    .main .comment { margin-top: 4px; font-size: 12px; color: #2d5b99; }
    .main .badge { display: inline-block; margin-left: 6px; font-size: 11px; padding: 1px 6px; border-radius: 20px; background: #f0f4ff; color: #38579a; }
    .right-btn { width: 32px; height: 28px; border-radius: 6px; border: 1px solid #cfd8e6; background: #fff; cursor: pointer; }
    .right-btn.move { color: #1f66b5; }
    .right-btn.edit { color: #2e7d32; }
    .right-btn.del { color: #6b768a; }
    .diary { display: none; }
    .diary.open { display: block; }
    .diary-list { margin: 0; padding-left: 18px; color: #4d5c76; font-size: 13px; line-height: 1.45; }
    .footer { position: fixed; left: 50%; transform: translateX(-50%); bottom: 8px; width: min(980px, 95vw); background: #fff; border: 1px solid #d9e1ef; border-radius: 12px; padding: 10px 14px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 14px rgba(0,0,0,.08); font-size: 13px; }
    .overlay { position: fixed; inset: 0; background: rgba(16,25,43,.35); display: none; align-items: center; justify-content: center; z-index: 99; }
    .overlay.open { display: flex; }
    .modal { width: min(560px, calc(100vw - 20px)); background: #fff; border: 1px solid #d3dced; border-radius: 12px; padding: 14px; }
    .modal h3 { margin: 0 0 8px; font-size: 18px; }
    .modal p { margin: 0 0 10px; color: #56637b; }
    .modal label { display: block; font-size: 13px; margin-bottom: 4px; color: #3c4960; }
    .modal textarea, .modal input[type="date"] { width: 100%; box-sizing: border-box; border: 1px solid #ccd6e8; border-radius: 8px; padding: 8px; font-size: 14px; }
    .modal .grid { display: grid; gap: 10px; }
    .modal .actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .modal .save { background: #2e7d32; border-color: #2e7d32; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="title">Макс Барабанов</div>
      <div class="meta">Temp-копия шага: проверяем UX "выполнено / не выполнено / перенос / комментарии"</div>
      <div class="tabs">
        <div class="tab">мечты</div>
        <div class="tab active" data-tab="steps">шаги</div>
        <div class="tab">витрина</div>
        <div class="tab" data-tab="diary">дневник</div>
      </div>
    </div>

    <div class="section steps" id="stepsSection">
      <div class="filter">
        <button class="active" data-filter="all">📋 Все</button>
        <button data-filter="current">☭ Сейчас</button>
        <button data-filter="overdue">⏰ Проср.</button>
        <button data-filter="done">✅ Готово</button>
        <button data-filter="missed">⚠️ Не вып.</button>
        <button data-filter="deleted">🗑️ Удал.</button>
      </div>
      <div id="stepsList"></div>
    </div>

    <div class="section diary" id="diarySection">
      <h3 style="margin:0 0 8px;">Дневник шагов</h3>
      <ul class="diary-list" id="diaryList"></ul>
    </div>
  </div>

  <div class="footer">
    <span>Временный стенд: без записи в БД</span>
    <span>v-temp</span>
  </div>

  <div class="overlay" id="modal">
    <div class="modal">
      <h3 id="mTitle">Комментарий</h3>
      <p id="mText"></p>
      <div class="grid">
        <div id="dateBlock" style="display:none;">
          <label for="mDate">Новая дата</label>
          <input type="date" id="mDate">
        </div>
        <div>
          <label for="mComment">Комментарий (обязательно)</label>
          <textarea id="mComment" rows="4" placeholder="Опиши ситуацию в 1–2 фразах"></textarea>
        </div>
      </div>
      <div class="actions">
        <button type="button" id="mCancel">Отмена</button>
        <button type="button" class="save" id="mSave">Сохранить</button>
      </div>
    </div>
  </div>

  <script>
    const today = "2026-04-13";
    const steps = [
      { id: 1, title: "Подъём в 6:15 (1/8)", date: "2026-04-13", time: "06:15", state: "active", comment: "", log: [] },
      { id: 2, title: "Энергопрактика ежедневно (1/8)", date: "2026-04-12", time: "08:15-08:30", state: "active", comment: "", log: [] },
      { id: 3, title: "Отбой до 23:00 (1/8)", date: "2026-04-13", time: "23:00", state: "active", comment: "", log: [] }
    ];
    const ui = {
      stepsList: document.getElementById("stepsList"),
      diaryList: document.getElementById("diaryList"),
      tabs: document.querySelectorAll(".tab[data-tab]"),
      stepsSection: document.getElementById("stepsSection"),
      diarySection: document.getElementById("diarySection"),
      modal: document.getElementById("modal"),
      mTitle: document.getElementById("mTitle"),
      mText: document.getElementById("mText"),
      mDate: document.getElementById("mDate"),
      mComment: document.getElementById("mComment"),
      dateBlock: document.getElementById("dateBlock"),
      mCancel: document.getElementById("mCancel"),
      mSave: document.getElementById("mSave"),
      filters: document.querySelectorAll(".filter button")
    };
    let currentFilter = "all";
    let pending = null;

    function uiDate(iso) {
      const [y, m, d] = iso.split("-");
      return `${d}.${m}.${y.slice(-2)}`;
    }
    function isOverdue(step) {
      return step.date < today && step.state === "active";
    }
    function pushDiary(text) {
      const li = document.createElement("li");
      li.textContent = text;
      ui.diaryList.prepend(li);
    }
    function matchesFilter(s) {
      if (currentFilter === "all") return s.state !== "deleted";
      if (currentFilter === "deleted") return s.state === "deleted";
      if (currentFilter === "done") return s.state === "done";
      if (currentFilter === "missed") return s.state === "missed";
      if (currentFilter === "overdue") return isOverdue(s);
      if (currentFilter === "current") return s.state === "active" && s.date >= today;
      return true;
    }
    function grouped(list) {
      const map = {};
      list.forEach(s => {
        const k = s.date;
        if (!map[k]) map[k] = [];
        map[k].push(s);
      });
      return Object.keys(map).sort().map(k => ({ date: k, items: map[k] }));
    }

    function render() {
      const visible = steps.filter(matchesFilter);
      const groups = grouped(visible);
      ui.stepsList.innerHTML = "";
      groups.forEach(g => {
        const day = document.createElement("div");
        day.className = "day";
        day.textContent = uiDate(g.date);
        ui.stepsList.appendChild(day);
        g.items.forEach(s => {
          const row = document.createElement("div");
          row.className = "step";
          const overdue = isOverdue(s);
          row.innerHTML = `
            <div class="left-actions">
              ${s.state === "deleted" ? "" : `<button class="btn-done" title="Выполнил" data-act="done" data-id="${s.id}">✓</button>`}
              ${s.state === "deleted" ? "" : `<button class="btn-missed" title="Не выполнил" data-act="missed" data-id="${s.id}">−</button>`}
              ${s.state === "deleted" ? "" : `<button class="btn-comment" title="Комментарий" data-act="comment" data-id="${s.id}">💬</button>`}
            </div>
            <div class="main">
              <div class="name">${s.title} ${overdue ? '<span class="badge">просрочен</span>' : ''}</div>
              <div class="when">${s.time ? s.time : "—"}</div>
              ${s.comment ? `<div class="comment">${s.comment}</div>` : ""}
            </div>
            ${s.state === "deleted" ? "<div></div><div></div><div></div>" : `
              <button class="right-btn move" title="Перенести" data-act="move" data-id="${s.id}">⇢</button>
              <button class="right-btn edit" title="Редактировать" data-act="edit" data-id="${s.id}">✏️</button>
              <button class="right-btn del" title="Удалить" data-act="delete" data-id="${s.id}">🗑️</button>
            `}
          `;
          ui.stepsList.appendChild(row);
        });
      });
      if (!visible.length) ui.stepsList.innerHTML = '<div style="color:#73819a;">Нет шагов в этом фильтре.</div>';
    }

    function openModal(kind, step) {
      pending = { kind, step };
      ui.mComment.value = "";
      ui.mDate.value = step.date;
      ui.dateBlock.style.display = kind === "move" ? "block" : "none";
      if (kind === "done_overdue") {
        ui.mTitle.textContent = "Просроченный шаг выполнен";
        ui.mText.textContent = "Опиши, почему шаг был просрочен. В будущем это поможет попадать в срок.";
      } else if (kind === "missed") {
        ui.mTitle.textContent = "Шаг не выполнен";
        ui.mText.textContent = "Очень жаль. Опиши почему не выполнил, в следующий раз поможем сделать чётко.";
      } else if (kind === "comment") {
        ui.mTitle.textContent = "Комментарий к шагу";
        ui.mText.textContent = "Текст попадёт в дневник в формате: дата — шаг — комментарий — статус.";
        ui.mComment.value = step.comment || "";
      } else {
        ui.mTitle.textContent = "Перенос шага";
        ui.mText.textContent = "Укажи новую дату и оставь комментарий причины переноса.";
      }
      ui.modal.classList.add("open");
    }
    function closeModal() {
      pending = null;
      ui.modal.classList.remove("open");
    }

    function applyAction(action, step) {
      if (action === "edit") {
        pushDiary(`✏️ Редактирование шага: "${step.title}"`);
        return;
      }
      if (action === "delete") {
        step.state = "deleted";
        step.comment = "";
        pushDiary(`🗑️ Удалён шаг: "${step.title}"`);
        render();
        return;
      }
      if (action === "done") {
        if (isOverdue(step)) {
          openModal("done_overdue", step);
          return;
        }
        step.state = "done";
        step.comment = "";
        pushDiary(`✅ Выполнен шаг: "${step.title}"`);
        render();
        return;
      }
      if (action === "missed") {
        openModal("missed", step);
        return;
      }
      if (action === "comment") {
        openModal("comment", step);
        return;
      }
      if (action === "move") {
        openModal("move", step);
      }
    }

    ui.stepsList.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-act]");
      if (!btn) return;
      const step = steps.find(x => x.id === Number(btn.dataset.id));
      if (!step) return;
      applyAction(btn.dataset.act, step);
    });

    ui.mCancel.addEventListener("click", closeModal);
    ui.modal.addEventListener("click", (e) => { if (e.target === ui.modal) closeModal(); });
    ui.mSave.addEventListener("click", () => {
      if (!pending) return;
      const txt = ui.mComment.value.trim();
      if (!txt) { alert("Комментарий обязателен."); return; }
      const { kind, step } = pending;
      if (kind === "move" && !ui.mDate.value) { alert("Укажи новую дату."); return; }
      function diaryLine(status) {
        return `${uiDate(step.date)} — ${step.title} — ${txt} — ${status}`;
      }
      if (kind === "done_overdue") {
        step.state = "done";
        step.comment = txt;
        pushDiary(diaryLine("выполнен (просрочен)"));
      } else if (kind === "missed") {
        step.state = "missed";
        step.comment = txt;
        pushDiary(diaryLine("не выполнен"));
      } else if (kind === "comment") {
        step.comment = txt;
        pushDiary(diaryLine("комментарий"));
      } else if (kind === "move") {
        const oldDate = step.date;
        step.date = ui.mDate.value;
        step.state = "active";
        step.comment = txt;
        pushDiary(`${uiDate(oldDate)} — ${step.title} — ${txt} — перенос → ${uiDate(step.date)}`);
      }
      closeModal();
      render();
    });

    ui.filters.forEach(b => b.addEventListener("click", () => {
      ui.filters.forEach(x => x.classList.remove("active"));
      b.classList.add("active");
      currentFilter = b.dataset.filter;
      render();
    }));
    ui.tabs.forEach(t => t.addEventListener("click", () => {
      ui.tabs.forEach(x => x.classList.remove("active"));
      t.classList.add("active");
      const tab = t.dataset.tab;
      ui.stepsSection.style.display = tab === "steps" ? "block" : "none";
      ui.diarySection.classList.toggle("open", tab === "diary");
      if (tab !== "diary") ui.diarySection.classList.remove("open");
    }));

    render();
    pushDiary("Temp-стенд запущен. Данные фейковые, логика интерактивная.");
  </script>
</body>
</html>
