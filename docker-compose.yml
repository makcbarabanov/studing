# Базовый стек (песочница без dev-файла / прод): только приложение FastAPI.
# Параметры БД — только из .env (DB_HOST, DB_USER, DB_PASS, DB_NAME, опционально DB_PORT).
# На проде: внешняя БД (например 83.217.220.97). Не добавлять сюда сервис db — см. docker-compose.dev.yml для песочницы с локальным Postgres.
services:
  app:
    build: .
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
